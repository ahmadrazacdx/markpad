name: MarkPDF CLI Windows Build

on:
  push:
    branches:
      - "**"
    tags:
      - "markpdf-v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --filter @workspace/markpdf-cli...

      - name: Build CLI bundle
        working-directory: artifacts/artifacts/markpdf-cli
        run: pnpm run build

      - name: Build Windows executable
        working-directory: artifacts/artifacts/markpdf-cli
        run: pnpm exec pkg dist/markpdf.cjs --targets node18-win-x64 --output out/markpdf-cli.exe

      - name: Download pandoc.exe
        shell: pwsh
        working-directory: artifacts/artifacts/markpdf-cli
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "out" | Out-Null

          $pandocAsset = "pandoc-3.6.4-windows-x86_64.zip"
          $pandocUrl = "https://github.com/jgm/pandoc/releases/download/3.6.4/$pandocAsset"
          $zipPath = "$env:RUNNER_TEMP/pandoc.zip"
          $extractDir = "$env:RUNNER_TEMP/pandoc"

          Invoke-WebRequest $pandocUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

          $pandocExe = Get-ChildItem $extractDir -Recurse -Filter pandoc.exe | Select-Object -First 1
          if (-not $pandocExe) { throw "pandoc.exe not found in archive" }

          Copy-Item $pandocExe.FullName "out/pandoc.exe" -Force

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y

      - name: Build installer
        shell: pwsh
        working-directory: artifacts/artifacts/markpdf-cli
        run: |
          $ErrorActionPreference = "Stop"
          $pkgRoot = (Get-Location).Path
          $outDir = Join-Path $pkgRoot "out"
          $outputExe = Join-Path $outDir "markpdf.exe"
          $iconPath = Join-Path $pkgRoot "public\markpdf-installer.ico"
          $scriptPath = Join-Path $pkgRoot "installer\markpdf-installer.nsi"
          $makeNsis = (Get-Command makensis -ErrorAction SilentlyContinue)?.Source

          if (-not $makeNsis) {
            $candidate = "C:\Program Files (x86)\NSIS\makensis.exe"
            if (Test-Path $candidate) {
              $makeNsis = $candidate
            }
          }

          if (-not $makeNsis) {
            throw "makensis.exe not found after NSIS installation"
          }

          & $makeNsis /DAPP_OUT_DIR=$outDir /DOUTPUT_EXE=$outputExe /DCLI_EXE=markpdf-cli.exe /DBRAND_ICON=$iconPath $scriptPath

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: markpdf-cli-windows-${{ github.sha }}
          path: artifacts/artifacts/markpdf-cli/out/markpdf.exe
          if-no-files-found: error

      - name: Publish GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/markpdf-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/artifacts/markpdf-cli/out/markpdf.exe
          fail_on_unmatched_files: true
